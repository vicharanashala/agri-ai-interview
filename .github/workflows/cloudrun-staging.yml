name: Build, Push & Deploy to Cloud Run (Staging)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

env:
  BACKEND_IMAGE: agri-interview-backend
  FRONTEND_IMAGE: agri-interview-frontend
  GCP_REGION: asia-south1
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  BACKEND_SERVICE: agri-interview-backend-staging
  FRONTEND_SERVICE: agri-interview-frontend-staging

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL_STAGING }}
            NEXT_PUBLIC_ADMIN_API_URL=${{ vars.NEXT_PUBLIC_API_URL_STAGING }}
            NEXTAUTH_URL=${{ vars.NEXTAUTH_URL_STAGING }}
            BACKEND_URL=${{ vars.NEXT_PUBLIC_API_URL_STAGING }}

  deploy_backend:
    name: Deploy Backend to Cloud Run
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_GH_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: ${{ env.BACKEND_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          env_vars: |
            MONGO_URI=${{ secrets.MONGO_URI_STAGING }}
            MONGO_DB_NAME=${{ vars.MONGO_DB_NAME_STAGING }}
            CORS_ORIGINS=${{ vars.CORS_ORIGINS_STAGING }}
            LLM_BASE_URL=${{ vars.LLM_BASE_URL }}
            LLM_API_KEY=${{ secrets.LLM_API_KEY }}
            LLM_MODEL=${{ vars.LLM_MODEL }}
            NEXTAUTH_URL=${{ vars.NEXTAUTH_URL_STAGING }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET_STAGING }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL_STAGING }}
            NEXT_PUBLIC_ADMIN_API_URL=${{ vars.NEXT_PUBLIC_API_URL_STAGING }}
            INTERNAL_SERVICE_TOKEN=${{ secrets.INTERNAL_SERVICE_TOKEN_STAGING }}
            GCS_BUCKET_NAME=${{ vars.GCS_BUCKET_NAME }}
            STORAGE_BACKEND=${{ vars.STORAGE_BACKEND }}
            GCS_BASE_PREFIX=${{ vars.GCS_BASE_PREFIX_STAGING }}

  deploy_frontend:
    name: Deploy Frontend to Cloud Run
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_GH_SA_KEY }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          env_vars: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL_STAGING }}
            NEXTAUTH_URL=${{ vars.NEXTAUTH_URL_STAGING }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET_STAGING }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            INTERNAL_SERVICE_TOKEN=${{ secrets.INTERNAL_SERVICE_TOKEN_STAGING }}
            BACKEND_URL=${{ vars.NEXT_PUBLIC_API_URL_STAGING }}
            NEXT_PUBLIC_ADMIN_API_URL=${{ vars.NEXT_PUBLIC_API_URL_STAGING }}