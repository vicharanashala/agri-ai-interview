services:
  agri-interview-backend:
    image: vicharanashala/agri-interview-backend:${IMAGE_TAG:-latest}
    container_name: agri-interview-backend
    restart: unless-stopped

    ports:
      - "${BACKEND_PORT:-8003}:8000"

    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB_NAME: ${MONGO_DB_NAME}

      CORS_ORIGINS: ${CORS_ORIGINS}

      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}

      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      ADMIN_SECRET: ${ADMIN_SECRET}
      OFFER_LETTER_SIGNING_KEY: ${OFFER_LETTER_SIGNING_KEY}
      OFFER_LETTER_PASSPHRASE: ${OFFER_LETTER_PASSPHRASE}

    volumes:
      - backend_uploads:/app/uploads

    networks:
      - agri-interview-net

  agri-interview-frontend:
    image: vicharanashala/agri-interview-frontend:${IMAGE_TAG:-latest}
    container_name: agri-interview-frontend
    restart: unless-stopped

    ports:
      - "${FRONTEND_PORT:-3003}:3000"

    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_ADMIN_API_URL: ${NEXT_PUBLIC_ADMIN_API_URL}

      BACKEND_URL: http://agri-interview-backend:8000

    depends_on:
      agri-interview-backend:
        condition: service_started

    networks:
      - agri-interview-net

volumes:
  backend_uploads:

networks:
  agri-interview-net:
    driver: bridge